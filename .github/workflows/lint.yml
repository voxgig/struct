name: Lint

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  lint-ts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 'lts/*'
      - working-directory: ./ts
        run: npm install
      - working-directory: ./ts
        run: make lint

  lint-js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 'lts/*'
      - working-directory: ./js
        run: npm install
      - working-directory: ./js
        run: make lint

  lint-py:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - working-directory: ./py
        run: pip install -r requirements-dev.txt
      - working-directory: ./py
        run: make lint

  lint-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-go@v4
        with:
          go-version: '1.24'
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: ./go
          args: --timeout 5m
      - working-directory: ./go
        run: make fmt-check vet

  lint-rs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - working-directory: ./rs
        run: make lint

  lint-rb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: ./rb
      - working-directory: ./rb
        run: make lint

  lint-php:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
      - working-directory: ./php
        run: composer install
      - working-directory: ./php
        run: make lint

  lint-java:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - working-directory: ./java
        run: make lint

  lint-kt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - working-directory: ./kt
        run: ./gradlew detekt ktlintCheck

  lint-lua:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: leafo/gh-actions-lua@v10
        with:
          luaVersion: "5.4"
      - uses: leafo/gh-actions-luarocks@v4
      - run: luarocks install luacheck
      - working-directory: ./lua
        run: luacheck src test

  lint-zig:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: mlugg/setup-zig@v1
        with:
          version: '0.13.0'
      - working-directory: ./zig
        run: zig fmt --check src test build.zig

  lint-cpp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - run: sudo apt-get update && sudo apt-get install -y nlohmann-json3-dev clang-tidy clang-format
      - working-directory: ./cpp
        run: make lint

  lint-cs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'
      - working-directory: ./cs
        run: dotnet build VoxgigStruct.csproj -warnaserror -nologo
