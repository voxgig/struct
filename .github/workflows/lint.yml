name: Lint

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

permissions:
  contents: read

env:
  # actions/checkout and the setup-* actions still bundle the deprecated
  # Node 20 runtime; opt them into Node 24 now (default from 2026-06-02).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint-typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
      - working-directory: ./typescript
        run: npm install
      - working-directory: ./typescript
        run: make lint

  lint-javascript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
      - working-directory: ./javascript
        run: npm install
      - working-directory: ./javascript
        run: make lint

  lint-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - working-directory: ./python
        run: pip install -r requirements-dev.txt
      - working-directory: ./python
        run: make lint

  lint-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Install golangci-lint
        run: curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh | sh -s -- -b "$(go env GOPATH)/bin" v2.5.0
      - working-directory: ./go
        run: |
          gobin="$(go env GOPATH)/bin"
          PATH="$gobin:$PATH" make lint

  lint-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - working-directory: ./rust
        run: make lint

  lint-ruby:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: ./ruby
      - working-directory: ./ruby
        run: make lint

  lint-php:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
      - working-directory: ./php
        # Use a fresh COMPOSER_HOME: setup-php intermittently writes a
        # malformed github-oauth token to its auth.json, which makes
        # `composer install` abort. We don't need authenticated installs here.
        run: composer install
        env:
          COMPOSER_HOME: ${{ runner.temp }}/composer-home
      - working-directory: ./php
        run: make lint

  lint-java:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - working-directory: ./java
        run: make lint

  lint-kotlin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - working-directory: ./kotlin
        run: ./gradlew detekt ktlintCheck

  lint-lua:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: leafo/gh-actions-lua@v10
        with:
          luaVersion: "5.4"
      - uses: leafo/gh-actions-luarocks@v4
      - run: luarocks install luacheck
      - working-directory: ./lua
        run: luacheck src test

  lint-zig:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v1
        with:
          version: '0.13.0'
      - working-directory: ./zig
        run: zig fmt --check src test build.zig

  lint-cpp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y nlohmann-json3-dev clang-tidy clang-format
      - working-directory: ./cpp
        run: make lint

  lint-csharp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - working-directory: ./csharp
        run: dotnet build VoxgigStruct.csproj -warnaserror -nologo
