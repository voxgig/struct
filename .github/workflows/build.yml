name: Build and Test

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

permissions:
  contents: read

env:
  # actions/checkout and the setup-* actions still bundle the deprecated
  # Node 20 runtime; opt them into Node 24 now (default from 2026-06-02).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-typescript:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [24, latest]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install dependencies
        working-directory: ./typescript
        run: npm install
      - name: Build
        working-directory: ./typescript
        run: npm run build
      - name: Run tests
        working-directory: ./typescript
        run: npm test

  test-javascript:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: ['24', 'latest']
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install dependencies
        working-directory: ./javascript
        run: npm install
      - name: Run tests
        working-directory: ./javascript
        run: npm test

  test-python:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run tests
        working-directory: ./python
        run: python -m unittest discover -s tests

  test-go:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        # go/go.mod declares `go 1.23`; older toolchains cannot compile it.
        go-version: ['1.23', '1.24']
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
      - name: Build
        working-directory: ./go
        run: go build ./...
      - name: Run tests
        working-directory: ./go
        run: go test -v ./...

  test-ruby:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
      - name: Install dependencies
        working-directory: ./ruby
        run: |
          gem install bundler
          bundle install
      - name: Run tests
        working-directory: ./ruby
        run: ruby test_voxgig_struct.rb

  test-php:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
      - name: Install dependencies
        working-directory: ./php
        # setup-php intermittently writes a malformed github-oauth token to its
        # auth.json; a fresh COMPOSER_HOME sidesteps it (no auth needed here).
        run: composer install
        env:
          COMPOSER_HOME: ${{ runner.temp }}/composer-home
      - name: Run tests
        working-directory: ./php
        run: vendor/bin/phpunit

  test-rust:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Build
        working-directory: ./rust
        run: cargo build --all-targets
      - name: Run tests
        working-directory: ./rust
        run: cargo test

  test-csharp:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Run tests
        working-directory: ./csharp/tests
        run: dotnet test

  test-kotlin:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        java-version: ['17']
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java ${{ matrix.java-version }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java-version }}
      - name: Run tests (Unix)
        if: runner.os != 'Windows'
        working-directory: ./kotlin
        run: ./gradlew test
      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        working-directory: ./kotlin
        shell: pwsh
        run: .\gradlew.bat test

  test-java:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        java-version: ['17']
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java ${{ matrix.java-version }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java-version }}
      - name: Run tests
        working-directory: ./java
        run: mvn -q test

  test-lua:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Lua
        uses: leafo/gh-actions-lua@v10
        with:
          luaVersion: "5.4"
      - name: Setup LuaRocks
        uses: leafo/gh-actions-luarocks@v4
      - name: Setup environment
        working-directory: ./lua
        shell: bash
        run: |
          chmod +x setup.sh
          ./setup.sh
      - name: Run tests
        working-directory: ./lua
        run: make test

  test-zig:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        zig-version: ['0.13.0']
    steps:
      - uses: actions/checkout@v4
      - name: Setup Zig ${{ matrix.zig-version }}
        uses: mlugg/setup-zig@v1
        with:
          version: ${{ matrix.zig-version }}
      - name: Build and test
        working-directory: ./zig
        shell: bash
        run: |
          # Zig test framework crashes with signal 11 during cleanup after all
          # tests pass (known *MapRef/*ListRef arena teardown issue). Treat
          # "N/N tests passed" as success regardless of cleanup exit code.
          # `--summary all` is required: without it, plain `zig build test`
          # prints `test success` with no count and the N/N grep below fails.
          out=$(zig build test --summary all 2>&1) || true
          echo "$out"
          passed=$(echo "$out" | grep -oE '[0-9]+/[0-9]+ tests passed' | head -1)
          if [ -n "$passed" ]; then
            x=$(echo "$passed" | cut -d/ -f1)
            y=$(echo "$passed" | cut -d/ -f2 | cut -d' ' -f1)
            if [ "$x" = "$y" ] && [ "$x" -gt 0 ]; then
              exit 0
            fi
          fi
          exit 1

  test-cpp:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install nlohmann/json (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y nlohmann-json3-dev
      - name: Install nlohmann/json (macOS)
        if: runner.os == 'macOS'
        run: brew install nlohmann-json
      - name: Run tests
        working-directory: ./cpp
        run: make test

  test-perl:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Perl (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y perl
      - name: Setup Perl (macOS)
        if: runner.os == 'macOS'
        run: |
          # macOS runners ship perl + prove; nothing to install. The port
          # has zero non-core runtime deps.
          perl -V | head -1
      - name: Run tests
        working-directory: ./perl
        run: prove -Ilib t/

  test-swift:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      # macOS runners ship a recent Swift toolchain (6.x) with Xcode by
      # default; `swift-actions/setup-swift@v2`'s macOS download path is
      # not reliable for 6.0.2 specifically. Only install on Linux.
      - name: Setup Swift (Linux)
        if: runner.os == 'Linux'
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: '6.0.2'
      - name: Swift version
        run: swift --version
      - name: Run tests
        working-directory: ./swift
        run: swift test --enable-test-discovery

  test-c:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Run tests
        working-directory: ./c
        run: make test

  test-scala:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: VirtusLab/scala-cli-setup@v1
      - name: Install make (Windows)
        if: runner.os == 'Windows'
        run: choco install make -y
      - name: Run tests
        working-directory: ./scala
        shell: bash
        run: make test

  test-clojure:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: DeLaGuardo/setup-clojure@13
        with:
          cli: latest
      - name: Install make (Windows)
        if: runner.os == 'Windows'
        run: choco install make -y
      - name: Run tests
        working-directory: ./clojure
        shell: bash
        run: make test

  test-dart:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
      - name: Install make (Windows)
        if: runner.os == 'Windows'
        run: choco install make -y
      - name: Run tests
        working-directory: ./dart
        shell: bash
        run: dart pub get && make test

  test-elixir:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      # erlef/setup-beam supports Ubuntu + Windows only; use Homebrew on macOS.
      - name: Setup Elixir (setup-beam)
        if: runner.os != 'macOS'
        uses: erlef/setup-beam@v1
        with:
          otp-version: '27'
          elixir-version: '1.18'
      - name: Setup Elixir (Homebrew, macOS)
        if: runner.os == 'macOS'
        run: brew install elixir
      - name: Install make (Windows)
        if: runner.os == 'Windows'
        run: choco install make -y
      - name: Run tests
        working-directory: ./elixir
        shell: bash
        run: make test

  test-haskell:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: haskell-actions/setup@v2
        with:
          ghc-version: '9.10'
      - name: Install make (Windows)
        if: runner.os == 'Windows'
        run: choco install make -y
      - name: Run tests
        working-directory: ./haskell
        shell: bash
        run: make test

  test-ocaml:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: '5'
      - name: Install make (Windows)
        if: runner.os == 'Windows'
        run: choco install make -y
      - name: Run tests
        working-directory: ./ocaml
        shell: bash
        run: make test
