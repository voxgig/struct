name: Build and Test

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

permissions:
  contents: read

jobs:
  test-ts:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [24, latest]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install dependencies
        working-directory: ./ts
        run: npm install
      - name: Build
        working-directory: ./ts
        run: npm run build
      - name: Run tests
        working-directory: ./ts
        run: npm test

  test-js:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: ['24', 'latest']
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install dependencies
        working-directory: ./js
        run: npm install
      - name: Run tests
        working-directory: ./js
        run: npm test

  test-py:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run tests
        working-directory: ./py
        run: python -m unittest discover -s tests

  test-go:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go-version: ['1.20', '1.21', '1.22', '1.23', '1.24']
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
      - name: Build
        working-directory: ./go
        run: go build ./...
      - name: Run tests
        working-directory: ./go
        run: go test -v ./...

  test-rb:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
      - name: Install dependencies
        working-directory: ./rb
        run: |
          gem install bundler
          bundle install
      - name: Run tests
        working-directory: ./rb
        run: ruby test_voxgig_struct.rb

  test-php:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
      - name: Install dependencies
        working-directory: ./php
        # setup-php intermittently writes a malformed github-oauth token to its
        # auth.json; a fresh COMPOSER_HOME sidesteps it (no auth needed here).
        run: composer install
        env:
          COMPOSER_HOME: ${{ runner.temp }}/composer-home
      - name: Run tests
        working-directory: ./php
        run: vendor/bin/phpunit

  test-rs:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Build
        working-directory: ./rs
        run: cargo build --all-targets
      - name: Run tests
        working-directory: ./rs
        run: cargo test

  test-cs:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Run tests
        working-directory: ./cs/tests
        run: dotnet test

  test-kt:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        java-version: ['17']
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java ${{ matrix.java-version }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java-version }}
      - name: Run tests (Unix)
        if: runner.os != 'Windows'
        working-directory: ./kt
        run: ./gradlew test
      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        working-directory: ./kt
        shell: pwsh
        run: .\gradlew.bat test

  test-java:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        java-version: ['17']
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java ${{ matrix.java-version }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java-version }}
      - name: Run tests
        working-directory: ./java
        run: mvn -q test

  test-lua:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Lua
        uses: leafo/gh-actions-lua@v10
        with:
          luaVersion: "5.4"
      - name: Setup LuaRocks
        uses: leafo/gh-actions-luarocks@v4
      - name: Setup environment
        working-directory: ./lua
        shell: bash
        run: |
          chmod +x setup.sh
          ./setup.sh
      - name: Run tests
        working-directory: ./lua
        run: make test

  test-zig:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        zig-version: ['0.13.0']
    steps:
      - uses: actions/checkout@v4
      - name: Setup Zig ${{ matrix.zig-version }}
        uses: mlugg/setup-zig@v1
        with:
          version: ${{ matrix.zig-version }}
      - name: Build and test
        working-directory: ./zig
        shell: bash
        run: |
          # Zig test framework crashes with signal 11 during cleanup after all
          # tests pass (known *MapRef/*ListRef arena teardown issue). Treat
          # "N/N tests passed" as success regardless of cleanup exit code.
          out=$(zig build test 2>&1) || true
          echo "$out"
          passed=$(echo "$out" | grep -oE '[0-9]+/[0-9]+ tests passed' | head -1)
          if [ -n "$passed" ]; then
            x=$(echo "$passed" | cut -d/ -f1)
            y=$(echo "$passed" | cut -d/ -f2 | cut -d' ' -f1)
            if [ "$x" = "$y" ] && [ "$x" -gt 0 ]; then
              exit 0
            fi
          fi
          exit 1

  test-cpp:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install nlohmann/json (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y nlohmann-json3-dev
      - name: Install nlohmann/json (macOS)
        if: runner.os == 'macOS'
        run: brew install nlohmann-json
      - name: Run tests
        working-directory: ./cpp
        run: make test
