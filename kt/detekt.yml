# detekt configuration for the Kotlin port.
# https://detekt.dev/
# This extends detekt's default rule set (buildUponDefaultConfig = true) and
# relaxes a few rules that conflict with mirroring the canonical TypeScript
# source layout.

build:
  maxIssues: 0

complexity:
  # The ported functions are large by design; don't fail on size alone.
  LongMethod:
    active: false
  LongParameterList:
    active: false
  CyclomaticComplexMethod:
    active: false
  NestedBlockDepth:
    active: false
  TooManyFunctions:
    active: false

style:
  MagicNumber:
    active: false
  ReturnCount:
    active: false
  WildcardImport:
    active: true

naming:
  # Type bit-flag constants are `T_string`, `M_VAL`, ... by cross-language convention.
  VariableNaming:
    active: false
  TopLevelPropertyNaming:
    active: false
  ObjectPropertyNaming:
    active: false
